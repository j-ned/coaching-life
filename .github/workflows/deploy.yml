name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── CI checks (runs on push + PR) ───
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm format:check

      - name: TypeScript
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

  # ─── Build (only on push to master, after CI passes) ───
  build:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject Environment Variables
        run: |
          echo "export const API_URL = '${{ secrets.API_URL }}';" > src/app/core/config.ts

      - name: Build production
        run: pnpm ng build --base-href /coaching-life/

      - name: Prepare SPA fallback
        run: cp dist/coaching-life/browser/index.html dist/coaching-life/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/coaching-life/browser

  # ─── Deploy (only after successful build) ───
  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
